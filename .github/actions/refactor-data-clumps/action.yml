name: Analyse & Refactor Data Clumps
description: >
  Analyse a project for data clumps using data-clumps-doctor, generate a
  prioritised refactoring list, and optionally trigger Copilot-based
  refactoring.

inputs:
  path-to-source:
    description: Relative path to source files inside the project
    required: false
    default: '.'
  output-path:
    description: Path to the data clumps JSON report
    required: false
    default: 'reports/data-clumps-doctor/data-clumps.json'
  badge-output-path:
    description: Path to the generated badge (optional, leave empty to skip)
    required: false
    default: ''
  source-language-type:
    description: 'Language of the source files (typescript, java, uml, ast, digitalTwinsDefinitionLanguage, ngsi-ld)'
    required: false
    default: 'typescript'
  refactor-data-clumps:
    description: 'Whether to refactor detected data clumps (true/false)'
    required: false
    default: 'false'
  create-issue-with-data-clumps:
    description: >
      When true, a GitHub Issue is created for each data clump in the priority list.
      This makes detected data clumps visible in the issue tracker for manual review
      or assignment.
    required: false
    default: 'true'
  automatically-let-github-copilot-refactor:
    description: >
      When true, the GitHub Copilot CLI is invoked directly on the runner to refactor
      each data clump in the priority list without any human interaction.
      Requires a personal access token (PAT) with the "Copilot Requests" permission
      stored as a secret and passed via the copilot-token input
      (set COPILOT_GITHUB_TOKEN in your environment, or use the copilot-token input).
    required: false
    default: 'false'
  cluster-type-priority:
    description: >
      Priority order of data clump cluster types.
      Use numeric (e.g. "1,2,3") or named values (e.g. "single,two,large").
      Cluster types: 1/single = isolated, 2/two/pair = pair, 3/large = three-or-more.
    required: false
    default: '1,2,3'
  refactor-amount:
    description: Number of data clumps to refactor
    required: false
    default: '1'
  previous-report-path:
    description: >
      Optional path to a previous data clumps report JSON. When provided together
      with trigger-refactor-only-when-data-clumps-change=true, refactoring is only
      triggered if the data clump count has changed compared to the previous report.
      If left empty, refactoring always runs (suitable for manual/first-time runs).
    required: false
    default: ''
  trigger-refactor-only-when-data-clumps-change:
    description: >
      When set to true, refactoring is only triggered if the data clump count differs
      from the previous report (requires previous-report-path to be set).
      If no previous report path is given or the file does not exist, refactoring
      always runs regardless of this setting.
    required: false
    default: 'false'
  copilot-token:
    description: >
      Personal access token (PAT) with the "Copilot Requests" permission, used to
      authenticate the GitHub Copilot CLI when automatically-let-github-copilot-refactor is true.
      Create a fine-grained PAT at github.com/settings/personal-access-tokens/new
      and add it as a repository secret (COPILOT_GITHUB_TOKEN).
    required: false
    default: ''

outputs:
  report-path:
    description: Path to the generated data clumps report
    value: ${{ inputs.output-path }}
  priority-list-path:
    description: Path to the generated priority list JSON
    value: reports/data-clumps-doctor/priority-list.json
  data-clumps-count:
    description: Number of detected data clumps (from the final report, after any refactoring)
    value: ${{ steps.data-clumps-count-final.outputs.count }}

runs:
  using: composite
  steps:
    # ── 1. Clone & build data-clumps-doctor ──────────────────────────────
    - name: "🔧 Clone data-clumps-doctor"
      shell: bash
      run: |
        git clone https://github.com/NilsBaumgartner1994/data-clumps-doctor "$RUNNER_TEMP/data-clumps-doctor"

    - name: "🔨 Build data-clumps-doctor"
      shell: bash
      run: |
        cd "$RUNNER_TEMP/data-clumps-doctor"
        yarn install --immutable
        yarn build

    # ── 2. Analyse project for data clumps (before refactoring) ──────────
    - name: "🩺 Analyse data clumps (before)"
      shell: bash
      run: |
        output_path="${{ inputs.output-path }}"
        mkdir -p "$(dirname "$output_path")"
        node "$RUNNER_TEMP/data-clumps-doctor/build/ignoreCoverage/cli.js" \
          --source_type "${{ inputs.source-language-type }}" \
          --commit_selection current \
          --output "$output_path" \
          --path_to_project "$GITHUB_WORKSPACE" \
          --relative_path_to_source_folder_in_project "${{ inputs.path-to-source }}"

    - name: "📊 Extract data clumps count (before)"
      id: data-clumps-count
      shell: bash
      run: |
        if ! count=$(jq '.report_summary.amount_data_clumps' "${{ inputs.output-path }}" 2>&1); then
          echo "::error::Failed to extract data clumps count from ${{ inputs.output-path }}: $count"
          exit 1
        fi
        if [ -z "$count" ] || [ "$count" = "null" ]; then
          echo "::error::No data clumps count found in report (report_summary.amount_data_clumps is missing or null)"
          exit 1
        fi
        echo "count=$count" >> "$GITHUB_OUTPUT"
        echo "Detected $count data clumps."

    # ── 3. Generate badge for the before-report (optional) ───────────────
    - name: "📁 Prepare badge directory"
      if: ${{ inputs.badge-output-path != '' }}
      shell: bash
      run: mkdir -p "$(dirname "${{ inputs.badge-output-path }}")"

    - name: "🎨 Determine badge color"
      id: badge-color
      if: ${{ inputs.badge-output-path != '' }}
      shell: bash
      run: |
        count=${{ steps.data-clumps-count.outputs.count }}
        if [ "$count" -le 10 ]; then
          echo "color=08A008" >> "$GITHUB_OUTPUT"
        elif [ "$count" -le 100 ]; then
          echo "color=FE7D37" >> "$GITHUB_OUTPUT"
        else
          echo "color=F85149" >> "$GITHUB_OUTPUT"
        fi

    - name: "🏷️ Generate data clumps badge"
      if: ${{ inputs.badge-output-path != '' }}
      uses: emibcn/badge-action@v2.0.2
      with:
        label: data clumps
        status: ${{ steps.data-clumps-count.outputs.count }}
        color: ${{ steps.badge-color.outputs.color }}
        path: ${{ inputs.badge-output-path }}

    # ── 4. Decide whether to run refactoring ─────────────────────────────
    - name: "🔍 Determine whether to run refactoring"
      id: refactor-decision
      if: ${{ inputs.refactor-data-clumps == 'true' }}
      shell: bash
      run: |
        if [ "${{ inputs.trigger-refactor-only-when-data-clumps-change }}" = "true" ]; then
          PREVIOUS_REPORT="${{ inputs.previous-report-path }}"
          if [ -n "$PREVIOUS_REPORT" ] && [ -f "$PREVIOUS_REPORT" ]; then
            if ! PREVIOUS_COUNT=$(jq '.report_summary.amount_data_clumps' "$PREVIOUS_REPORT" 2>/dev/null); then
              echo "::warning::Could not parse previous report at '$PREVIOUS_REPORT' – running refactoring unconditionally."
            elif [ -z "$PREVIOUS_COUNT" ] || [ "$PREVIOUS_COUNT" = "null" ]; then
              echo "::warning::Previous report at '$PREVIOUS_REPORT' has no amount_data_clumps field – running refactoring unconditionally."
            else
              CURRENT_COUNT="${{ steps.data-clumps-count.outputs.count }}"
              echo "Previous data clump count: $PREVIOUS_COUNT"
              echo "Current data clump count:  $CURRENT_COUNT"
              if [ "$PREVIOUS_COUNT" = "$CURRENT_COUNT" ]; then
                echo "Data clump count unchanged ($CURRENT_COUNT). Skipping refactoring."
                echo "should-refactor=false" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              echo "Data clump count changed from $PREVIOUS_COUNT to $CURRENT_COUNT. Running refactoring."
            fi
          else
            echo "No previous report available at '${PREVIOUS_REPORT}'. Running refactoring unconditionally."
          fi
        fi
        echo "should-refactor=true" >> "$GITHUB_OUTPUT"

    # ── 5. Generate priority list ────────────────────────────────────────
    - name: "📋 Generate data clumps priority list"
      if: ${{ inputs.refactor-data-clumps == 'true' && steps.refactor-decision.outputs.should-refactor == 'true' }}
      shell: bash
      run: |
        mkdir -p reports/data-clumps-doctor
        node "$RUNNER_TEMP/data-clumps-doctor/build/ignoreCoverage/cliGeneratePriorityList.js" \
          --report_path "${{ inputs.output-path }}" \
          --cluster_type_priority "${{ inputs.cluster-type-priority }}" \
          --amount "${{ inputs.refactor-amount }}" \
          --output reports/data-clumps-doctor/priority-list.json

    # ── 6. Create GitHub Issue for detected data clumps (optional) ──────
    - name: "🐛 Create GitHub Issue for data clumps"
      if: ${{ inputs.refactor-data-clumps == 'true' && inputs.create-issue-with-data-clumps == 'true' && steps.refactor-decision.outputs.should-refactor == 'true' }}
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        echo "::notice::🐛 GitHub Issue creation step started"

        PRIORITY_LIST="reports/data-clumps-doctor/priority-list.json"
        if [ ! -f "$PRIORITY_LIST" ]; then
          echo "::warning::Priority list not found at $PRIORITY_LIST – skipping issue creation."
          exit 0
        fi

        ITEM_COUNT=$(jq 'length' "$PRIORITY_LIST")
        echo "::notice::Found $ITEM_COUNT data clump(s) in priority list."

        # Generate the issue body markdown via the TypeScript CLI
        ISSUE_BODY_FILE="$RUNNER_TEMP/data-clumps-doctor-issue-body.md"
        node "$RUNNER_TEMP/data-clumps-doctor/build/ignoreCoverage/cliGenerateIssueMarkdown.js" \
          --priority_list "$PRIORITY_LIST" \
          --report_path "${{ inputs.output-path }}" \
          --output "$ISSUE_BODY_FILE"

        TASK_TITLE="chore: Refactor data clumps (${ITEM_COUNT} detected)"

        if ISSUE_URL=$(gh issue create \
            --title "$TASK_TITLE" \
            --body-file "$ISSUE_BODY_FILE" \
            --repo "$GITHUB_REPOSITORY" 2>&1); then
          echo "::notice::✅ Issue created: $ISSUE_URL"
        else
          echo "::error::Failed to create issue: $ISSUE_URL"
          exit 1
        fi

        echo "::notice::🐛 Issue creation finished."

    # ── 7. Copilot CLI-based refactoring (optional) ──────────────────────
    - name: "📦 Install GitHub Copilot CLI"
      if: ${{ inputs.refactor-data-clumps == 'true' && inputs.automatically-let-github-copilot-refactor == 'true' && steps.refactor-decision.outputs.should-refactor == 'true' }}
      shell: bash
      run: npm install -g @github/copilot

    - name: "🤖 Refactor with GitHub Copilot CLI"
      if: ${{ inputs.refactor-data-clumps == 'true' && inputs.automatically-let-github-copilot-refactor == 'true' && steps.refactor-decision.outputs.should-refactor == 'true' }}
      shell: bash
      env:
        COPILOT_GITHUB_TOKEN: ${{ inputs.copilot-token }}
      run: |
        set -euo pipefail

        echo "::notice::🤖 Copilot CLI Refactoring step started"

        PRIORITY_LIST="reports/data-clumps-doctor/priority-list.json"
        if [ ! -f "$PRIORITY_LIST" ]; then
          echo "::warning::Priority list not found at $PRIORITY_LIST – skipping Copilot refactoring."
          exit 0
        fi

        if [ -z "${COPILOT_GITHUB_TOKEN:-}" ]; then
          echo "::error::copilot-token input is empty. Provide a PAT with the 'Copilot Requests' permission as the copilot-token input."
          exit 1
        fi

        ITEM_COUNT=$(jq 'length' "$PRIORITY_LIST")
        echo "::notice::Found $ITEM_COUNT data clump(s) in priority list to refactor."

        REFACTORED=0
        for i in $(seq 0 $((ITEM_COUNT - 1))); do
          ITEM=$(jq ".[$i]" "$PRIORITY_LIST")
          CLUSTER_ID=$(echo "$ITEM" | jq -r '.cluster_id')
          DC_TYPE=$(echo "$ITEM" | jq -r '.data_clump_type')
          FROM_CLASS=$(echo "$ITEM" | jq -r '.from_class_or_interface_name')
          TO_CLASS=$(echo "$ITEM" | jq -r '.to_class_or_interface_name')
          VARIABLES=$(echo "$ITEM" | jq -r '.variable_names | join(", ")')
          AMOUNT=$(echo "$ITEM" | jq -r '.amount_of_variables')

          echo "--- Data Clump $((i + 1))/$ITEM_COUNT ---"
          echo "Cluster ID : $CLUSTER_ID"
          echo "Type       : $DC_TYPE"
          echo "From class : $FROM_CLASS"
          echo "To class   : $TO_CLASS"
          echo "Variables  : $VARIABLES (total: $AMOUNT)"
          echo ""

          PROMPT="Refactor a data clump in this ${{ inputs.source-language-type }} project (cluster ID: ${CLUSTER_ID}, type: ${DC_TYPE}). The classes '${FROM_CLASS}' and '${TO_CLASS}' share ${AMOUNT} variable(s): ${VARIABLES}. Extract these shared variables into a new dedicated class or parameter object, then update all usages of these variables throughout the codebase to use the new class. Preserve existing behaviour and ensure all existing tests still pass."

          echo "Running Copilot CLI for cluster $CLUSTER_ID..."
          if copilot -p "$PROMPT" \
              --allow-tool=read \
              --allow-tool=write \
              --allow-tool='shell(git:*)' \
              --no-ask-user; then
            echo "::notice::✅ Copilot CLI refactoring completed for cluster $CLUSTER_ID"
            REFACTORED=$((REFACTORED + 1))
          else
            echo "::error::Copilot CLI refactoring failed for cluster $CLUSTER_ID"
          fi

          echo ""
        done

        echo "::notice::🤖 Copilot CLI Refactoring step finished – $REFACTORED/$ITEM_COUNT data clump(s) refactored."

    # ── 8. Re-analyse after refactoring to get updated report ────────────
    - name: "🔄 Re-analyse data clumps (after refactoring)"
      if: ${{ inputs.refactor-data-clumps == 'true' && steps.refactor-decision.outputs.should-refactor == 'true' }}
      shell: bash
      run: |
        output_path="${{ inputs.output-path }}"
        echo "Re-analysing project to update data clumps report after refactoring..."
        node "$RUNNER_TEMP/data-clumps-doctor/build/ignoreCoverage/cli.js" \
          --source_type "${{ inputs.source-language-type }}" \
          --commit_selection current \
          --output "$output_path" \
          --path_to_project "$GITHUB_WORKSPACE" \
          --relative_path_to_source_folder_in_project "${{ inputs.path-to-source }}"

    - name: "📊 Extract data clumps count (final)"
      id: data-clumps-count-final
      shell: bash
      run: |
        if ! count=$(jq '.report_summary.amount_data_clumps' "${{ inputs.output-path }}" 2>&1); then
          echo "::error::Failed to extract final data clumps count from ${{ inputs.output-path }}: $count"
          exit 1
        fi
        count=${count:-0}
        echo "count=$count" >> "$GITHUB_OUTPUT"
        echo "Final data clumps count: $count"

    # ── 9. Update badge with final count (optional) ───────────────────────
    - name: "🎨 Determine final badge color"
      id: badge-color-final
      if: ${{ inputs.badge-output-path != '' && inputs.refactor-data-clumps == 'true' && steps.refactor-decision.outputs.should-refactor == 'true' }}
      shell: bash
      run: |
        count=${{ steps.data-clumps-count-final.outputs.count }}
        if [ "$count" -le 10 ]; then
          echo "color=08A008" >> "$GITHUB_OUTPUT"
        elif [ "$count" -le 100 ]; then
          echo "color=FE7D37" >> "$GITHUB_OUTPUT"
        else
          echo "color=F85149" >> "$GITHUB_OUTPUT"
        fi

    - name: "🏷️ Update data clumps badge (after refactoring)"
      if: ${{ inputs.badge-output-path != '' && inputs.refactor-data-clumps == 'true' && steps.refactor-decision.outputs.should-refactor == 'true' }}
      uses: emibcn/badge-action@v2.0.2
      with:
        label: data clumps
        status: ${{ steps.data-clumps-count-final.outputs.count }}
        color: ${{ steps.badge-color-final.outputs.color }}
        path: ${{ inputs.badge-output-path }}

    # ── 10. Summary ───────────────────────────────────────────────────────
    - name: "📝 Publish analysis summary"
      shell: bash
      run: |
        COUNT_BEFORE="${{ steps.data-clumps-count.outputs.count }}"
        COUNT_FINAL="${{ steps.data-clumps-count-final.outputs.count }}"
        SHOULD_REFACTOR="${{ steps.refactor-decision.outputs.should-refactor }}"
        {
          echo "## 🩺 Data Clumps Analysis"
          echo ""
          echo "| | Count |"
          echo "|---|---|"
          echo "| **Before** | $COUNT_BEFORE |"
          if [ "$SHOULD_REFACTOR" = "true" ]; then
            echo "| **After refactoring** | $COUNT_FINAL |"
          fi
          echo ""
          echo "- **Report path:** \`${{ inputs.output-path }}\`"
          echo "- **Refactoring enabled:** ${{ inputs.refactor-data-clumps }}"
          echo "- **Create issues for data clumps:** ${{ inputs.create-issue-with-data-clumps }}"
          echo "- **Automatic Copilot refactoring:** ${{ inputs.automatically-let-github-copilot-refactor }}"
          if [ "${{ inputs.refactor-data-clumps }}" = "true" ]; then
            echo "- **Cluster type priority:** ${{ inputs.cluster-type-priority }}"
            echo "- **Refactor amount:** ${{ inputs.refactor-amount }}"
            echo "- **Refactoring ran:** $SHOULD_REFACTOR"
            if [ -f reports/data-clumps-doctor/priority-list.json ]; then
              PCOUNT=$(jq 'length' reports/data-clumps-doctor/priority-list.json)
              echo "- **Priority list entries:** $PCOUNT"
            fi
          fi
        } >> "$GITHUB_STEP_SUMMARY"

