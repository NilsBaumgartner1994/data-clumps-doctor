name: Analyse Data Clumps
description: >
  Detect data clumps, optionally generate a badge and/or create a GitHub Issue.
  Exposes data-clumps-count and found-data-clumps outputs so the workflow can
  act as a quality gate.

inputs:
  path-to-source:
    description: Relative path to source files inside the project
    required: false
    default: '.'
  output-path:
    description: Path to the JSON report output
    required: false
    default: 'reports/data-clumps-doctor/data-clumps.json'
  source-language-type:
    description: 'Language of the source files (typescript, java, uml, ast, digitalTwinsDefinitionLanguage, ngsi-ld)'
    required: false
    default: 'typescript'
  badge-output-path:
    description: Path to write the badge SVG to (leave empty to skip badge generation)
    required: false
    default: ''
  generate-issue:
    description: >
      When true, a GitHub Issue is created with the detected data clumps as the body.
      Requires issues: write permission in the calling workflow.
    required: false
    default: 'false'
  cluster-type-priority:
    description: >
      Priority order of data clump cluster types used for the issue body.
      Use numeric (e.g. "1,2,3") or named values (e.g. "single,two,large").
    required: false
    default: '1,2,3'
  refactor-amount:
    description: Number of top data clumps to list in the issue body
    required: false
    default: '5'
  only-update-if-changes:
    description: >
      When true, badge generation and issue creation are skipped if the data
      clumps content has not changed since the last report (compared by hashing
      the data_clumps section of the JSON). Useful for avoiding unnecessary
      badge updates and duplicate issues on every push when the detected data
      clumps are identical.
    required: false
    default: 'true'
  detector-options-path:
    description: >
      Path to a JSON file containing detector options (relative to the repository root).
      All fields of the detector options object are supported (e.g. pathsIgnoredInDetectionComparison,
      ignoredVariableNames, pathsExcludedFromParsing). When provided, options from this file
      are applied during detection. Individual detector option inputs (see below) take precedence
      over values in this file when both are set.
    required: false
    default: ''
  detector-options-paths-ignored-in-detection-comparison:
    description: >
      A comma-separated list of path patterns that are parsed but ignored during detection
      comparison. Files matching these paths are included in the AST but will not be considered
      as sources or targets during data-clump detection.
      Supports wildcards, e.g. "src/generated/*,**/fixtures/**".
    required: false
    default: ''

outputs:
  report-path:
    description: Path to the generated data clumps report
    value: ${{ inputs.output-path }}
  data-clumps-count:
    description: Number of detected data clumps
    value: ${{ steps.data-clumps-count.outputs.count }}
  found-data-clumps:
    description: "'true' if at least one data clump was detected, 'false' otherwise. Use this output as a quality gate: fail the workflow when found-data-clumps == 'true'."
    value: ${{ steps.data-clumps-count.outputs.found }}
  changes-detected:
    description: >
      'true' if the data clumps content changed compared to the previous report
      (or no previous report existed), 'false' if the content is identical.
      Always 'true' when only-update-if-changes is 'false'.
    value: ${{ steps.check-changes.outputs.changes-detected }}

runs:
  using: composite
  steps:
    # ── 0. Capture hash of existing report (before analysis) ─────────────
    - name: "📂 Capture previous report hash"
      id: previous-hash
      shell: bash
      run: |
        output_path="${{ inputs.output-path }}"
        if [ "${{ inputs.only-update-if-changes }}" = "true" ] && [ -f "$output_path" ]; then
          prev_hash=$(jq -c '.data_clumps // null' "$output_path" | sha256sum | awk '{print $1}')
          echo "hash=$prev_hash" >> "$GITHUB_OUTPUT"
        else
          echo "hash=" >> "$GITHUB_OUTPUT"
        fi

    # ── 1. Clone & build data-clumps-doctor ──────────────────────────────
    - name: "🔧 Clone data-clumps-doctor"
      shell: bash
      run: |
        git clone https://github.com/NilsBaumgartner1994/data-clumps-doctor "$RUNNER_TEMP/data-clumps-doctor"

    - name: "🔨 Build data-clumps-doctor"
      shell: bash
      run: |
        cd "$RUNNER_TEMP/data-clumps-doctor"
        yarn install --immutable
        yarn build

    # ── 2. Detect data clumps ────────────────────────────────────────────
    - name: "🩺 Run data-clumps analysis"
      shell: bash
      run: |
        output_path="${{ inputs.output-path }}"
        mkdir -p "$(dirname "$output_path")"

        extra_args=()

        detector_options_path="${{ inputs.detector-options-path }}"
        if [ -n "$detector_options_path" ]; then
          extra_args+=(--detector_options_path "$GITHUB_WORKSPACE/$detector_options_path")
        fi

        ignored_paths="${{ inputs.detector-options-paths-ignored-in-detection-comparison }}"
        if [ -n "$ignored_paths" ]; then
          extra_args+=(--detector_options_paths_ignored_in_detection_comparison "[$ignored_paths]")
        fi

        node "$RUNNER_TEMP/data-clumps-doctor/build/ignoreCoverage/cli.js" \
          --source_type "${{ inputs.source-language-type }}" \
          --commit_selection current \
          --output "$output_path" \
          --path_to_project "$GITHUB_WORKSPACE" \
          --relative_path_to_source_folder_in_project "${{ inputs.path-to-source }}" \
          ${extra_args[@]+"${extra_args[@]}"}

    # ── 3. Extract count & set quality-gate output ───────────────────────
    - name: "📊 Extract data clumps count"
      id: data-clumps-count
      shell: bash
      run: |
        count=$(jq '.report_summary.amount_data_clumps // 0' "${{ inputs.output-path }}")
        echo "count=$count" >> "$GITHUB_OUTPUT"
        if [ "$count" -gt 0 ]; then
          echo "found=true" >> "$GITHUB_OUTPUT"
        else
          echo "found=false" >> "$GITHUB_OUTPUT"
        fi
        echo "Detected $count data clump(s)."

    # ── 3b. Compare data clumps content hash ─────────────────────────────
    - name: "🔍 Check for changes in data clumps content"
      id: check-changes
      shell: bash
      run: |
        if [ "${{ inputs.only-update-if-changes }}" != "true" ]; then
          echo "changes-detected=true" >> "$GITHUB_OUTPUT"
          echo "only-update-if-changes is disabled – treating report as changed."
          exit 0
        fi
        new_hash=$(jq -c '.data_clumps // null' "${{ inputs.output-path }}" | sha256sum | awk '{print $1}')
        prev_hash="${{ steps.previous-hash.outputs.hash }}"
        if [ -z "$prev_hash" ] || [ "$prev_hash" != "$new_hash" ]; then
          echo "changes-detected=true" >> "$GITHUB_OUTPUT"
          echo "Data clumps content changed (or no previous report existed) – badge and issue will be updated."
        else
          echo "changes-detected=false" >> "$GITHUB_OUTPUT"
          echo "::notice::Data clumps content is unchanged – skipping badge generation and issue creation."
        fi

    # ── 4. Badge (optional) ──────────────────────────────────────────────
    - name: "📁 Prepare badge directory"
      if: ${{ inputs.badge-output-path != '' && steps.check-changes.outputs.changes-detected != 'false' }}
      shell: bash
      run: mkdir -p "$(dirname "${{ inputs.badge-output-path }}")"

    - name: "🎨 Determine badge color"
      id: badge-color
      if: ${{ inputs.badge-output-path != '' && steps.check-changes.outputs.changes-detected != 'false' }}
      shell: bash
      run: |
        count=${{ steps.data-clumps-count.outputs.count }}
        if [ "$count" -le 10 ]; then
          echo "color=08A008" >> "$GITHUB_OUTPUT"
        elif [ "$count" -le 100 ]; then
          echo "color=FE7D37" >> "$GITHUB_OUTPUT"
        else
          echo "color=F85149" >> "$GITHUB_OUTPUT"
        fi

    - name: "🏷️ Generate data clumps badge"
      if: ${{ inputs.badge-output-path != '' && steps.check-changes.outputs.changes-detected != 'false' }}
      uses: emibcn/badge-action@v2.0.2
      with:
        label: data clumps
        status: ${{ steps.data-clumps-count.outputs.count }}
        color: ${{ steps.badge-color.outputs.color }}
        path: ${{ inputs.badge-output-path }}

    # ── 5. GitHub Issue (optional) ───────────────────────────────────────
    - name: "ℹ️ No data clumps found — skipping issue creation"
      if: ${{ inputs.generate-issue == 'true' && steps.data-clumps-count.outputs.count == 0 && steps.check-changes.outputs.changes-detected != 'false' }}
      shell: bash
      run: echo "::notice::generate-issue is true but no data clumps were detected — no issue will be created."

    - name: "ℹ️ Data clumps unchanged — skipping issue creation"
      if: ${{ inputs.generate-issue == 'true' && steps.check-changes.outputs.changes-detected == 'false' }}
      shell: bash
      run: echo "::notice::generate-issue is true but data clumps content is unchanged — no issue will be created."

    - name: "🐛 Create GitHub Issue for data clumps"
      if: ${{ inputs.generate-issue == 'true' && steps.data-clumps-count.outputs.count > 0 && steps.check-changes.outputs.changes-detected != 'false' }}
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        BRANCH_NAME: ${{ github.ref_name }}
      run: |
        set -euo pipefail

        echo "::notice::🐛 GitHub Issue creation step started"

        # Derive a branch-specific label (sanitise branch name for use as a GitHub label)
        SAFE_BRANCH=$(echo "${BRANCH_NAME}" | sed 's/[^a-zA-Z0-9._-]/-/g' | cut -c1-50)
        LABEL_NAME="data-clumps:${SAFE_BRANCH}"

        # Ensure the branch-specific label exists (--force updates it if it already exists)
        gh label create "${LABEL_NAME}" \
          --repo "$GITHUB_REPOSITORY" \
          --color "0075ca" \
          --description "Data clumps issues for branch ${BRANCH_NAME}" \
          --force

        # Find existing open issues tagged with this branch label
        OLD_ISSUES=$(gh issue list \
          --repo "$GITHUB_REPOSITORY" \
          --label "${LABEL_NAME}" \
          --state open \
          --json number \
          --jq '.[].number')

        # Close old issues before creating a new one so the newly created issue
        # is always the latest open issue for this branch.
        if [ -n "$OLD_ISSUES" ]; then
          for ISSUE_NUMBER in $OLD_ISSUES; do
            gh issue comment "$ISSUE_NUMBER" \
              --repo "$GITHUB_REPOSITORY" \
              --body "A new data clumps analysis is being run for branch \`${BRANCH_NAME}\`. Closing this issue."
            gh issue close "$ISSUE_NUMBER" \
              --repo "$GITHUB_REPOSITORY"
            echo "::notice::🔒 Closed old issue #${ISSUE_NUMBER}."
          done
        fi

        ISSUE_BODY_FILE="$RUNNER_TEMP/data-clumps-doctor-issue-body.md"
        node "$RUNNER_TEMP/data-clumps-doctor/build/ignoreCoverage/cliGenerateMarkdownReport.js" \
          --report_path "${{ inputs.output-path }}" \
          --cluster_type_priority "${{ inputs.cluster-type-priority }}" \
          --amount "${{ inputs.refactor-amount }}" \
          --markdown_output_path "$ISSUE_BODY_FILE"

        DATA_CLUMPS_COUNT="${{ steps.data-clumps-count.outputs.count }}"
        TASK_TITLE="chore: Refactor data clumps (${DATA_CLUMPS_COUNT} detected)"

        if ISSUE_URL=$(gh issue create \
            --title "$TASK_TITLE" \
            --body-file "$ISSUE_BODY_FILE" \
            --label "${LABEL_NAME}" \
            --repo "$GITHUB_REPOSITORY" 2>&1); then
          echo "::notice::✅ Issue created: $ISSUE_URL"
        else
          echo "::error::Failed to create issue: $ISSUE_URL"
          exit 1
        fi

        echo "::notice::🐛 Issue creation finished."
