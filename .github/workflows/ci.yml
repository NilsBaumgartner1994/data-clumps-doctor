name: "🚀 CI"

on:
  push:
    branches: [main, master, dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  lint:
    name: "🎨 Prettier & ESLint"
    runs-on: ubuntu-latest
    steps:
      - name: "🔄 Checkout Repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: "🧰 Setup Node.js, Yarn & Dependencies"
        uses: ./.github/actions/setup-and-install
        with:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      - name: "🎨 Prettier"
        run: yarn format
      - name: "✨ ESLint"
        run: yarn lint
      - name: "📤 Commit linting changes"
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git diff --quiet || (git add -A && git commit -m "chore: apply lint fixes [skip ci]" && git push)

  data-clumps-report:
    name: "🩺 Analyse Data Clumps"
    runs-on: ubuntu-latest
    needs: [lint]
    permissions:
      contents: write
      issues: write
    steps:
      - name: "🔄 Checkout Repository"
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: "⚙️ Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "22.16.0"
      - name: "📦 Install dependencies"
        run: |
          corepack enable
          yarn install --immutable
      - name: "🧪 Run Jest tests"
        run: |
          mkdir -p reports/tests
          yarn build
          yarn testOnly --json --outputFile=reports/tests/jest-results.json --ci --runInBand
      - name: "🔢 Extract test case count"
        id: test-count
        run: |
          count=$(jq '.numTotalTests // 0' reports/tests/jest-results.json)
          echo "count=$count" >> "$GITHUB_OUTPUT"
      - name: "🎨 Prepare test badge directory"
        run: mkdir -p reports/tests/badges
      - name: "🎯 Determine test badge color"
        id: test-badge-color
        run: |
          if [ "${TEST_COUNT}" -eq 0 ]; then
            echo "color=9E9E9E" >> "$GITHUB_OUTPUT"
          else
            echo "color=08A008" >> "$GITHUB_OUTPUT"
          fi
        env:
          TEST_COUNT: ${{ steps.test-count.outputs.count }}
      - name: "🏷️ Generate test cases badge"
        uses: emibcn/badge-action@v2.0.2
        with:
          label: test cases
          status: ${{ steps.test-count.outputs.count }}
          color: ${{ steps.test-badge-color.outputs.color }}
          path: reports/tests/badges/test-cases.svg
      - name: "📝 Publish test summary"
        run: |
          {
            echo "## ✅ Test cases"
            echo ""
            echo "- Total test cases: ${TEST_COUNT}"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          TEST_COUNT: ${{ steps.test-count.outputs.count }}
      - name: "🩺 Analyse data clumps"
        uses: ./.github/actions/analyse-data-clumps
        with:
          path-to-source: ./src
          output-path: reports/data-clumps-doctor/data-clumps.json
          source-language-type: typescript
      - name: "🏷️ Create data clumps badge"
        uses: ./.github/actions/create-data-clumps-badge
        with:
          report-path: reports/data-clumps-doctor/data-clumps.json
          badge-output-path: reports/data-clumps-doctor/badges/data-clumps.svg
      - name: "🐛 Create data clumps issue"
        uses: ./.github/actions/create-data-clumps-issue
        with:
          report-path: reports/data-clumps-doctor/data-clumps.json
      - name: "💾 Commit reports"
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          any_reports=false
          if [ -d reports/data-clumps-doctor ]; then
            cp -r reports/data-clumps-doctor /tmp/generated-data-clumps-doctor
            any_reports=true
          fi
          if [ -d reports/tests ]; then
            cp -r reports/tests /tmp/generated-tests
            any_reports=true
          fi
          if [ "$any_reports" = "false" ]; then
            echo "No reports generated, skipping commit"
          else
            # Sync with upstream (force reset to avoid merge conflicts in generated files)
            git fetch origin "$GITHUB_REF_NAME"
            git reset --hard "origin/$GITHUB_REF_NAME"
            paths_to_commit=()
            if [ -d /tmp/generated-data-clumps-doctor ]; then
              mkdir -p reports/data-clumps-doctor
              cp -r /tmp/generated-data-clumps-doctor/. reports/data-clumps-doctor/
              paths_to_commit+=("reports/data-clumps-doctor")
            fi
            if [ -d /tmp/generated-tests ]; then
              mkdir -p reports/tests
              cp -r /tmp/generated-tests/. reports/tests/
              paths_to_commit+=("reports/tests")
            fi
            git add -f "${paths_to_commit[@]}"
            if git diff --cached --quiet; then
              echo "No changes to commit"
            else
              git commit -m "chore: update automated reports [skip ci]"
              git push
            fi
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  push-changes:
    name: "📤 Push Changes"
    runs-on: ubuntu-latest
    needs: [data-clumps-report]
    steps:
      - name: "🔄 Checkout Repository"
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: "📤 Push accumulated changes"
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git push

